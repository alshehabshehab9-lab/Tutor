<!DOCTYPE html>
<html>
<head>
    <title>Test Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
        }
        form {
            background: #f4f4f4;
            padding: 20px;
            border-radius: 8px;
        }
        input, button {
            padding: 10px;
            margin: 10px 0;
            width: 100%;
        }
        button {
            background: #2c3e50;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h2>Test POST Route</h2>
    <form action="/test" method="POST">
        <label>Test Input:</label>
        <input type="text" name="test" value="hello world">
        <button type="submit">Submit Test</button>
    </form>
    <p><a href="/">Back to Home</a></p>
</body>
</html>
